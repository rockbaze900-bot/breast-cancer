<!DOCTYPE html>
<html>
<head>
    <title>Breast Cancer Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 class="mb-4">Breast Cancer Predictor</h2>

<form action="/predict" method="post">
    <div class="row">
        <div class="col"><input class="form-control" name="f1" placeholder="Feature 1" required></div>
        <div class="col"><input class="form-control" name="f2" placeholder="Feature 2" required></div>
        <div class="col"><input class="form-control" name="f3" placeholder="Feature 3" required></div>
    </div>
    <br>
    <button class="btn btn-primary">Predict</button>
</form>

<h3 class="mt-4 text-success">{{ prediction_text }}</h3>

</body>
</html>
